name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Gerar animação da cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: ks-12345
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7A3FF2&color_dots=#ebedf0,#c8d1fa,#a5b4fc,#818cf8,#6366f1
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00C2FF

      - name: Publicar no branch de saída
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
